name = "proxycontroller"
main = "src/index.js"
compatibility_date = "2026-06-03"

# 告诉 Cloudflare 这是一个普通的 Worker
workers_dev = true

# 声明代码中用到的环境变量（用户在部署页面或稍后可以修改）
[vars]
WEB_USER = "ubuntu01"
WEB_PASS = "Jzw2zj1314lmop12"
PROXY_USER = "ubuntu01"
PROXY_PASS = "Jzw2zj1314lmop12"

# 声明 D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "proxy_db"
database_id = "f1bd23a3-f7bb-4a2a-88b5-d8f8e079840f" # 留空，一键部署向导或后续配置会引导用户绑定他们自己的 D1 数据库
